services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Paths inside the container — match what Dockerfile COPYs
      MODEL_PATH: ml/artifacts/model.joblib
      TRAINING_STATS_PATH: ml/artifacts/training_stats.json
      PROMPTS_DIR: prompts
      HOST: 0.0.0.0
      PORT: "8000"
    # Override ENVIRONMENT=production in .env to switch LLM provider
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
