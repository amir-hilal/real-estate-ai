<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Price Estimator</title>
  <!--
    React 18 + Babel Standalone + Tailwind Play CDN — no npm, no build step.
    One self-contained HTML file served by FastAPI GET /.
  -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ---------------------------------------------------------------------------
    // Schema metadata — mirrors app/schemas/property_features.py
    // ---------------------------------------------------------------------------

    const NEIGHBORHOODS = [
      "Blmngtn", "Blueste", "BrDale", "BrkSide", "ClearCr", "CollgCr",
      "Crawfor", "Edwards", "Gilbert", "IDOTRR", "MeadowV", "Mitchel",
      "NAmes", "NoRidge", "NPkVill", "NridgHt", "NWAmes", "OldTown",
      "SWISU", "Sawyer", "SawyerW", "Somerst", "StoneBr", "Timber", "Veenker",
    ];

    const EXTERIORS = [
      "VinylSd", "HdBoard", "MetalSd", "Wd Sdng", "Plywood", "CemntBd",
      "BrkFace", "WdShing", "Stucco", "AsbShng", "Other",
    ];

    const FIELD_META = {
      GrLivArea:    { label: "Above-Grade Living Area", unit: "sq ft",      type: "number", min: 300,   max: 6000   },
      OverallQual:  { label: "Overall Quality",         unit: "1–10 scale", type: "number", min: 1,     max: 10     },
      YearBuilt:    { label: "Year Built",              unit: null,         type: "number", min: 1800,  max: 2025   },
      Neighborhood: { label: "Neighborhood",            unit: null,         type: "select", options: NEIGHBORHOODS },
      TotalBsmtSF:  { label: "Total Basement Area",     unit: "sq ft",      type: "number", min: 0,     max: 6000   },
      GarageCars:   { label: "Garage Capacity",         unit: "cars",       type: "number", min: 0,     max: 5      },
      FullBath:     { label: "Full Bathrooms (above grade)", unit: null,    type: "number", min: 0,     max: 5      },
      YearRemodAdd: { label: "Year Last Remodelled",    unit: null,         type: "number", min: 1800,  max: 2025   },
      Fireplaces:   { label: "Number of Fireplaces",    unit: null,         type: "number", min: 0,     max: 5      },
      LotArea:      { label: "Lot Area",                unit: "sq ft",      type: "number", min: 1000,  max: 200000 },
      MasVnrArea:   { label: "Masonry Veneer Area",     unit: "sq ft",      type: "number", min: 0,     max: 2000   },
      Exterior1st:  { label: "Primary Exterior Material", unit: null,       type: "select", options: EXTERIORS     },
    };

    function formatUSD(n) {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n);
    }

    // ---------------------------------------------------------------------------
    // Stage loader — narrates what the pipeline is doing
    // Timing roughly matches: LLM extraction (~0-6s), ML inference (~instant),
    // LLM explanation (~6-14s+)
    // ---------------------------------------------------------------------------

    const LOADING_STAGES = [
      { label: "Thinking...",           detail: "Reading your property description" },
      { label: "Studying the market...", detail: "Comparing with similar Ames properties" },
      { label: "Interpreting results...", detail: "Preparing your personalised estimate" },
    ];

    function StageLoader() {
      const [current, setCurrent] = useState(0);

      useEffect(() => {
        const t1 = setTimeout(() => setCurrent(1), 6000);
        const t2 = setTimeout(() => setCurrent(2), 14000);
        return () => { clearTimeout(t1); clearTimeout(t2); };
      }, []);

      return (
        <div className="py-8 space-y-2">
          {LOADING_STAGES.map((s, i) => {
            const done    = i < current;
            const active  = i === current;
            const waiting = i > current;
            return (
              <div
                key={i}
                className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-700
                  ${active  ? "bg-blue-50 border border-blue-100" : ""}
                  ${done    ? "opacity-50" : ""}
                  ${waiting ? "opacity-20" : ""}
                `}
              >
                {/* Stage badge */}
                <div className={`w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 text-sm font-bold
                  ${done   ? "bg-green-100 text-green-700" : ""}
                  ${active ? "bg-blue-600 text-white"     : ""}
                  ${waiting? "bg-gray-100 text-gray-400"  : ""}
                `}>
                  {done ? "✓" : i + 1}
                </div>

                {/* Label + detail */}
                <div className="min-w-0 flex-1">
                  <p className={`text-sm font-semibold
                    ${done    ? "text-gray-400" : ""}
                    ${active  ? "text-blue-800" : ""}
                    ${waiting ? "text-gray-300" : ""}
                  `}>
                    {s.label}
                  </p>
                  {active && (
                    <p className="text-xs text-blue-500 mt-0.5 animate-pulse">{s.detail}</p>
                  )}
                </div>

                {/* Spinner on active stage */}
                {active && (
                  <div className="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full animate-spin flex-shrink-0" />
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // ---------------------------------------------------------------------------
    // Step 1 — Description input
    // ---------------------------------------------------------------------------

    function InputForm({ onSubmit }) {
      const [description, setDescription] = useState("");
      const [error, setError] = useState(null);

      function handleSubmit(e) {
        e.preventDefault();
        if (!description.trim()) {
          setError("Please describe a property before submitting.");
          return;
        }
        setError(null);
        onSubmit(description);
      }

      return (
        <form onSubmit={handleSubmit} className="space-y-4">
          <textarea
            className="w-full border border-gray-200 rounded-xl p-4 text-sm text-gray-800
              focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:outline-none
              resize-none placeholder-gray-400 bg-gray-50 transition-colors focus:bg-white"
            rows={5}
            placeholder="Tell me about the property — size, age, neighbourhood, number of rooms, any notable features..."
            value={description}
            onChange={e => setDescription(e.target.value)}
          />
          {error && <p className="text-red-500 text-sm">{error}</p>}
          <button
            type="submit"
            className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition-colors text-sm"
          >
            Get My Estimate →
          </button>
        </form>
      );
    }

    // ---------------------------------------------------------------------------
    // Step 2a — Missing required fields
    // ---------------------------------------------------------------------------

    function MissingFieldsForm({ description, extractedFeatures, missingFields, onSubmit, loading }) {
      const [values, setValues]   = useState({});
      const [touched, setTouched] = useState({});

      function handleSubmit(e) {
        e.preventDefault();
        const allTouched = Object.fromEntries(missingFields.map(f => [f, true]));
        setTouched(allTouched);
        if (!missingFields.every(f => values[f] !== undefined && values[f] !== "")) return;
        onSubmit(description, values);
      }

      const extracted = Object.entries(extractedFeatures).filter(([, v]) => v !== null && v !== undefined);

      return (
        <div className="space-y-5">
          <div>
            <h2 className="text-lg font-semibold text-gray-800">Got it! Just a few more details.</h2>
            <p className="text-sm text-gray-500 mt-1">
              I couldn't determine the following from your description. Can you help with these?
            </p>
          </div>

          {extracted.length > 0 && (
            <div className="bg-gray-50 border border-gray-100 rounded-xl p-3">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">What I found so far</p>
              <ul className="space-y-1">
                {extracted.map(([k, v]) => (
                  <li key={k} className="flex justify-between text-sm">
                    <span className="text-gray-400">{FIELD_META[k]?.label ?? k}</span>
                    <span className="font-medium text-gray-700">{String(v)}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}

          <form onSubmit={handleSubmit} className="space-y-4">
            {missingFields.map(field => {
              const meta       = FIELD_META[field];
              if (!meta) return null;
              const isEmpty    = touched[field] && (values[field] === undefined || values[field] === "");
              const borderCls  = isEmpty ? "border-red-300 focus:ring-red-400" : "border-gray-200 focus:ring-blue-500";
              const inputClass = `w-full border ${borderCls} rounded-xl p-3 text-sm focus:outline-none focus:ring-2 transition-colors bg-gray-50 focus:bg-white`;

              return (
                <div key={field}>
                  <label className="block text-sm font-medium text-gray-700 mb-1">
                    {meta.label}
                    {meta.unit && <span className="text-gray-400 font-normal"> ({meta.unit})</span>}
                    <span className="text-red-500 ml-1">*</span>
                  </label>
                  {meta.type === "select" ? (
                    <select
                      className={inputClass}
                      value={values[field] ?? ""}
                      onChange={e => { setValues(v => ({...v, [field]: e.target.value})); setTouched(t => ({...t, [field]: true})); }}
                    >
                      <option value="">Select…</option>
                      {meta.options.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  ) : (
                    <input
                      type="number"
                      min={meta.min}
                      max={meta.max}
                      placeholder={`${meta.min}–${meta.max}`}
                      className={inputClass}
                      value={values[field] ?? ""}
                      onChange={e => { setValues(v => ({...v, [field]: e.target.value})); setTouched(t => ({...t, [field]: true})); }}
                    />
                  )}
                  {isEmpty && <p className="text-red-500 text-xs mt-1">This field is required.</p>}
                </div>
              );
            })}

            <button
              type="submit"
              disabled={loading}
              className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-semibold py-3 px-4 rounded-xl transition-colors text-sm"
            >
              {loading ? "Getting estimate…" : "Get My Estimate →"}
            </button>
          </form>
        </div>
      );
    }

    // ---------------------------------------------------------------------------
    // Step 3 — Results
    // ---------------------------------------------------------------------------

    function ResultCard({ data, onReset }) {
      const [showDetails, setShowDetails] = useState(false);
      const filled = Object.entries(data.features ?? {}).filter(([, v]) => v !== null && v !== undefined);

      return (
        <div className="space-y-6">
          {/* Prediction */}
          <div className="bg-blue-50 border border-blue-200 rounded-2xl p-6 text-center">
            <p className="text-xs font-semibold text-blue-400 uppercase tracking-widest mb-1">Estimated Property Value</p>
            <p className="text-5xl font-bold text-blue-700 my-3">{formatUSD(data.prediction_usd)}</p>
            <p className="text-xs text-blue-400">Based on Ames, Iowa market data · 2006–2010</p>
          </div>

          {/* Explanation */}
          {data.explanation && data.explanation !== "Explanation temporarily unavailable." ? (
            <div>
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Why this price?</p>
              <div className="text-sm text-gray-600 leading-relaxed space-y-3">
                {data.explanation.split(/\n\n+/).map((p, i) => <p key={i}>{p}</p>)}
              </div>
            </div>
          ) : (
            <p className="text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded-xl p-3">
              Explanation temporarily unavailable.
            </p>
          )}

          {/* Extracted features (collapsible) */}
          {filled.length > 0 && (
            <div>
              <button
                onClick={() => setShowDetails(d => !d)}
                className="text-sm text-blue-600 hover:underline flex items-center gap-1"
              >
                <span>{showDetails ? "▾" : "▸"}</span>
                <span>{showDetails ? "Hide details" : "Show details I used"}</span>
              </button>
              {showDetails && (
                <ul className="mt-2 space-y-1.5 text-sm border border-gray-100 rounded-xl p-3 bg-gray-50">
                  {filled.map(([k, v]) => (
                    <li key={k} className="flex justify-between">
                      <span className="text-gray-400">{FIELD_META[k]?.label ?? k}</span>
                      <span className="font-medium text-gray-700">{String(v)}</span>
                    </li>
                  ))}
                </ul>
              )}
            </div>
          )}

          <button
            onClick={onReset}
            className="w-full border border-gray-200 hover:border-gray-300 text-gray-600 font-medium py-2.5 px-4 rounded-xl transition-colors text-sm"
          >
            Estimate Another Property
          </button>
        </div>
      );
    }

    // ---------------------------------------------------------------------------
    // Error state
    // ---------------------------------------------------------------------------

    function ErrorCard({ message, onReset }) {
      return (
        <div className="space-y-4">
          <div className="bg-red-50 border border-red-100 rounded-2xl p-6 text-center">
            <p className="text-3xl mb-3">⚠️</p>
            <p className="text-sm text-red-600">{message}</p>
          </div>
          <button
            onClick={onReset}
            className="w-full border border-gray-200 hover:border-gray-300 text-gray-600 font-medium py-2.5 px-4 rounded-xl transition-colors text-sm"
          >
            Try Again
          </button>
        </div>
      );
    }

    // ---------------------------------------------------------------------------
    // Root App — state machine
    // States: 'input' | 'loading' | 'incomplete' | 'result' | 'error'
    // ---------------------------------------------------------------------------

    function App() {
      const [step, setStep]           = useState("input");
      const [saved, setSaved]         = useState("");
      const [resultData, setResult]   = useState(null);
      const [errorMsg, setErrorMsg]   = useState("");

      async function callPredict(description, supplemental = null) {
        setStep("loading");
        setSaved(description);

        const body = { description };
        if (supplemental && Object.keys(supplemental).length > 0) {
          const coerced = {};
          for (const [k, v] of Object.entries(supplemental)) {
            coerced[k] = FIELD_META[k]?.type === "number" ? Number(v) : v;
          }
          body.supplemental_features = coerced;
        }

        try {
          const controller = new AbortController();
          const timeout    = setTimeout(() => controller.abort(), 120_000);

          const res = await fetch("/predict", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify(body),
            signal:  controller.signal,
          });
          clearTimeout(timeout);

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            const msg =
              res.status === 422 ? (err.detail?.message ?? "Your description couldn't be processed. Try adding more details.") :
              res.status === 503 ? "The model is not ready yet. Please try again in a moment."  :
                                   (err.detail?.message ?? "An internal error occurred. Please try again.");
            setErrorMsg(msg);
            setStep("error");
            return;
          }

          const data = await res.json();
          if (data.status === "incomplete") {
            setResult(data);
            setStep("incomplete");
          } else if (data.status === "complete") {
            setResult(data);
            setStep("result");
          } else {
            setErrorMsg(data.message ?? "An unexpected error occurred.");
            setStep("error");
          }
        } catch (e) {
          setErrorMsg(
            e.name === "AbortError"
              ? "This is taking longer than expected. Please try again."
              : "Could not reach the server. Please check your connection and try again."
          );
          setStep("error");
        }
      }

      function reset() {
        setStep("input");
        setSaved("");
        setResult(null);
        setErrorMsg("");
      }

      return (
        <div className="max-w-xl mx-auto px-4 py-12">
          {/* Header */}
          <div className="mb-8 text-center">
            <h1 className="text-3xl font-bold text-gray-900 tracking-tight">Property Price Estimator</h1>
            <p className="text-gray-400 mt-2 text-sm">Describe a property — I'll estimate its value using ML + AI</p>
          </div>

          {/* Card */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            {step === "input"      && <InputForm onSubmit={desc => callPredict(desc)} />}
            {step === "loading"    && <StageLoader />}
            {step === "incomplete" && (
              <MissingFieldsForm
                description={saved}
                extractedFeatures={resultData?.features ?? {}}
                missingFields={resultData?.missing_required_fields ?? []}
                onSubmit={(desc, sup) => callPredict(desc, sup)}
                loading={false}
              />
            )}
            {step === "result"     && <ResultCard data={resultData} onReset={reset} />}
            {step === "error"      && <ErrorCard  message={errorMsg} onReset={reset} />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
